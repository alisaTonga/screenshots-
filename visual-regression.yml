name: Visual Regression

on:
  schedule:
    - cron: '0 5 * * *'      # daily at 05:00 UTC (06:00/07:00 Germany, depending on DST)
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger a run manually from the Actions tab

concurrency:
  group: visual-regression
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npm test

      - name: Upload HTML report (always, so failures are inspectable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
